name: Python Unit Tests

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Run Unit Tests
      working-directory: laboratories/cicd-documentation
      run: |
        python3 -m unittest test_tree.py